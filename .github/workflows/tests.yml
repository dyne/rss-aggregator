name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
      PATH: ${{ github.workspace }}/.venv/bin:${{ env.PATH }}
      PYTHONPATH: /usr/lib/python3/dist-packages

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system XML tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-libxml2 xsltproc

      - name: Create uv environment
        run: uv venv --python 3.12 --seed .venv

      - name: Install dependencies
        run: uv sync --active --locked

      - name: Run tests
        run: uv run --active python runtests.py
