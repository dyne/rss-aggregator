name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create uv environment
        run: uv venv --python 3.12 --seed .venv

      - name: Install dependencies
        run: |
          VIRTUAL_ENV="$PWD/.venv" PATH="$PWD/.venv/bin:$PATH" \
          uv sync --active --locked

      - name: Run tests
        run: |
          VIRTUAL_ENV="$PWD/.venv" PATH="$PWD/.venv/bin:$PATH" \
          uv run --active python runtests.py
