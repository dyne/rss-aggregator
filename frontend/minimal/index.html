<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minimal News Frontend</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f5f7fb;
        --pill-bg: #ffffff;
        --pill-border: #d6dde9;
        --text-main: #18202b;
        --text-muted: #4b5b70;
        --accent: #174f9c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #f8faff 0%, var(--page-bg) 100%);
        color: var(--text-main);
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 1rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.35rem;
      }

      #news-status {
        margin: 0 0 0.9rem;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      #news-list {
        display: grid;
        gap: 0.7rem;
      }

      .news-pill {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 0.7rem;
        align-items: start;
        text-decoration: none;
        color: inherit;
        background: var(--pill-bg);
        border: 1px solid var(--pill-border);
        border-radius: 8px;
        padding: 0.55rem;
      }

      .news-pill:hover {
        border-color: var(--accent);
      }

      .news-image {
        width: 92px;
        height: 92px;
        object-fit: cover;
        border-radius: 6px;
        background: #e7edf7;
      }

      .news-text {
        min-width: 0;
      }

      .news-title {
        margin: 0 0 0.32rem;
        font-weight: 700;
        font-size: 1rem;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .news-summary {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      @media (max-width: 620px) {
        .news-pill {
          grid-template-columns: 1fr;
        }

        .news-image {
          width: 100%;
          height: 180px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>News</h1>
      <p id="news-status" aria-live="polite"></p>
      <div id="news-list"></div>
    </main>

    <script>
      // Frontend configuration:
      // 1) NEWS_BASE_URL: directory where news-index.json is served.
      // 2) ITEMS_TO_SHOW: desired number of newest entries to display.
      const NEWS_BASE_URL = "http://localhost:8000/output/";
      const ITEMS_TO_SHOW = 10;

      const statusNode = document.getElementById("news-status");
      const listNode = document.getElementById("news-list");

      function setStatus(message) {
        statusNode.textContent = message;
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("Request failed: " + response.status + " " + url);
        }
        return response.json();
      }

      function getEntryImageSource(entry) {
        if (!entry || !entry.image || typeof entry.image !== "object") {
          return "";
        }
        if (entry.image.data_base64 && entry.image.mime_type) {
          return "data:" + entry.image.mime_type + ";base64," + entry.image.data_base64;
        }
        return entry.image.url || "";
      }

      function renderEntry(entry) {
        const link = document.createElement("a");
        link.className = "news-pill";
        link.href = entry.url || "#";
        link.target = "_blank";
        link.rel = "noopener noreferrer";

        const imageSource = getEntryImageSource(entry);
        if (imageSource) {
          const image = document.createElement("img");
          image.className = "news-image";
          image.src = imageSource;
          image.alt = "";
          link.appendChild(image);
        }

        const text = document.createElement("div");
        text.className = "news-text";

        const title = document.createElement("p");
        title.className = "news-title";
        title.textContent = entry.title || entry.url || "Untitled";
        text.appendChild(title);

        const summary = document.createElement("p");
        summary.className = "news-summary";
        summary.textContent = entry.summary || "";
        text.appendChild(summary);

        link.appendChild(text);
        return link;
      }

      async function loadNews() {
        const indexUrl = new URL("news-index.json", NEWS_BASE_URL);
        const index = await fetchJson(indexUrl);

        if (typeof index.total !== "number" || !Array.isArray(index.urls)) {
          throw new Error("Invalid index format");
        }

        const limit = Math.min(ITEMS_TO_SHOW, index.total, index.urls.length);
        const selectedUrls = index.urls.slice(0, limit).map(function (relativeUrl) {
          return new URL(relativeUrl, indexUrl).toString();
        });

        return Promise.all(selectedUrls.map(fetchJson));
      }

      async function start() {
        setStatus("Loading news...");
        try {
          const entries = await loadNews();
          listNode.replaceChildren();

          if (entries.length === 0) {
            setStatus("No news available.");
            return;
          }

          for (const entry of entries) {
            listNode.appendChild(renderEntry(entry));
          }
          setStatus("");
        } catch (error) {
          console.error(error);
          setStatus("Could not load news.");
        }
      }

      start();
    </script>
  </body>
</html>
